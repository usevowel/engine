# Engine Configuration - Production
# Stored in R2: sndbrd-store/config/production.yaml
# Billing section must match pricing/fixtures.yaml (meter: voice_hours)
#
# Push to R2: bun run engine-config:push (or manual wrangler r2 object put)

version: "1.0.0"
lastUpdated: "2026-02-22T00:00:00Z"
environment: "production"

# ============================================================================
# Provider Stack Presets (minimal - engine still uses env vars for providers)
# ============================================================================
presets:
  default:
    name: "Default Stack"
    description: "OpenRouter LLM, AssemblyAI STT, Inworld TTS"
    llm:
      provider: "openrouter"
      model: "x-ai/grok-4-fast"
      tokensPerHourRate: 80000
      costMultiplier: 1.0
    stt:
      provider: "assemblyai"
      sampleRate: 24000
      encoding: "pcm_s16le"
      costPerHour: 0.05
    tts:
      provider: "inworld"
      voice: "Ashley"
      sampleRate: 24000
      costPerHour: 0.10
    vad:
      provider: "assemblyai-integrated"
      enabled: false

defaultPreset: "default"

# ============================================================================
# Engine Runtime Settings (minimal - engine still uses env vars)
# ============================================================================
settings:
  vad:
    enabled: false
    threshold: 0.5
    minSilenceMs: 550
    speechPadMs: 0
  turnDetection:
    enabled: false
  languageDetection:
    enabled: true
  callDuration:
    maxCallDurationMs: 1800000
    maxIdleDurationMs: 600000
  agent:
    useModularAgents: true
    defaultType: "custom"

# ============================================================================
# Billing Configuration
# MUST match pricing/fixtures.yaml (meter name, tiers)
# enabled: true = billing on. enabled: false = same as TEST_MODE (billing off)
# ============================================================================
billing:
  enabled: true
  polar:
    meter: "voice_hours"
  tokenConversion:
    tokensPerHourRate: 80000
  tiers:
    starter:
      name: "Starter"
      hourlyRate: 1.59
      tokensPerHourAllowance: 50000
      overageRatePerHour: 1.59
    professional:
      name: "Professional"
      hourlyRate: 1.59
      tokensPerHourAllowance: 200000
      overageRatePerHour: 1.59
    business:
      name: "Business"
      hourlyRate: 1.59
      tokensPerHourAllowance: 600000
      overageRatePerHour: 1.59
  defaultTier: "starter"
  abandonment:
    timeoutMs: 30000
    minimumBillingHours: 0.001
